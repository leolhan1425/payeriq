services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payeriq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payeriq_dev}
      POSTGRES_DB: ${POSTGRES_DB:-payeriq}
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
